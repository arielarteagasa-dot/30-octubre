```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita Preciosa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
body,html{
margin:0;padding:0;
width:100%;height:100%;
background:#050505;
color:white;
overflow:hidden;
font-family:'Quicksand',sans-serif;
}

#start-screen{
position:fixed;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000;
z-index:9999;
cursor:pointer;
}

.heart-icon{
font-size:6rem;
animation:beat 1.2s infinite;
}

@keyframes beat{50%{transform:scale(1.2);}}

.interactive-obj{
position:absolute;
font-size:3rem;
cursor:pointer;
animation:float 4s infinite;
}

@keyframes float{50%{transform:translateY(-10px);}}

/* MODAL */
.modal{
display:none;
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:#000;
padding:20px;
border-radius:20px;
text-align:center;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#ff6b81;
color:white;
border-radius:10px;
}
</style>
</head>

<body>

<div id="start-screen">
<div class="heart-icon">❤️</div>
<h1>Toca para empezar</h1>
</div>

<!-- 🔥 AUDIO CORRECTO -->
<audio id="bg-music" loop preload="auto">
<source src="cancion.mp3" type="audio/mpeg">
</audio>

<!-- OBJETOS -->
<div class="interactive-obj" style="top:30%;left:20%" onclick="show(1)">💖</div>
<div class="interactive-obj" style="top:60%;left:30%" onclick="show(2)">🌟</div>
<div class="interactive-obj" style="top:40%;left:70%" onclick="show(3)">🎁</div>
<div class="interactive-obj" style="top:70%;left:75%" onclick="show(4)">📜</div>
<div class="interactive-obj" style="top:15%;left:60%" onclick="show(5)">💎</div>

<div class="modal" id="modal">
<div class="modal-content" id="modal-content"></div>
</div>

<script>
const audio = document.getElementById("bg-music");
let started = false;

/* 🔥 ESTO ES LO IMPORTANTE */
document.getElementById("start-screen").addEventListener("click", function () {

if(started) return;
started = true;

this.style.display = "none";

/* FORZAR REPRODUCCIÓN REAL */
audio.muted = false;
audio.volume = 1;

audio.play().then(()=>{
console.log("Música iniciada correctamente");
}).catch(err=>{
console.log("Error audio:", err);
alert("Toca otra vez para activar la música ❤️");
});
});

/* SORPRESAS */
function show(n){
let textos=[
"Eres el amor de mi vida ❤️",
"Todo de ti me encanta 😍",
"Vale por un beso 😘",
"<img src='foto.jpg' width='200'><br>Mi momento favorito ❤️",
"Siempre tú 💍"
];

document.getElementById("modal-content").innerHTML=
`<p>${textos[n-1]}</p>
<button onclick="closeModal()">Cerrar</button>`;

document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
```
