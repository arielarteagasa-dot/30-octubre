<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Invernadero de Natasha | 30 de Octubre</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Raleway:wght@200;400&display=swap');

        body { margin: 0; overflow: hidden; background: #050205; font-family: 'Raleway', sans-serif; }
        
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a0a1a; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 2s;
        }
        .bloom-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: #ff80ab; filter: blur(20px);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; padding: 40px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .header h1 { 
            font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #fff;
            margin: 0; letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,128,171,0.6);
            opacity: 0; transform: translateY(-20px); transition: 2.5s;
        }

        #caption {
            text-align: center; color: #ffebf2; font-family: 'Playfair Display', serif;
            font-size: 1.8rem; font-style: italic; opacity: 0; transition: 1.5s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-bottom: 100px;
        }

        .footer-info {
            text-align: center; color: rgba(255,255,255,0.4); font-size: 0.7rem;
            letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="bloom-circle"></div>
    <p style="color: white; letter-spacing: 5px; margin-top: 30px; font-size: 10px;">CULTIVANDO TU JARDÍN...</p>
</div>

<div id="ui-layer">
    <div class="header" id="ui-header">
        <h1>Natasha</h1>
        <p style="color: #ff80ab; letter-spacing: 6px; font-size: 12px; margin: 5px 0;">EL INVERNADERO DE NUESTRA HISTORIA</p>
    </div>

    <div id="caption"></div>

    <div class="footer-info">Explora el jardín · Toca las flores de cristal</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, flowers = [], fireflies;
const clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a050a);
    scene.fog = new THREE.FogExp2(0x1a0a1a, 0.015);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 50);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2 - 0.1;

    // 1. EL DOMO DE CRISTAL (Arquitectura)
    const domeGeo = new THREE.SphereGeometry(60, 32, 20, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshPhongMaterial({
        color: 0x442244, wireframe: true, transparent: true, opacity: 0.1
    });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    scene.add(dome);

    // 2. EL SUELO (Mármol Negro)
    const floorGeo = new THREE.CircleGeometry(60, 64);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.9, roughness: 0.1 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 3. LUCES AMBIENTALES
    const ambient = new THREE.AmbientLight(0x402040, 0.5);
    scene.add(ambient);

    const hemi = new THREE.HemisphereLight(0xff80ab, 0x050505, 0.4);
    scene.add(hemi);

    // 4. LUCIÉRNAGAS (Densidad Visual)
    const fireflyGeo = new THREE.BufferGeometry();
    const fireflyPos = [];
    for(let i=0; i<300; i++) {
        fireflyPos.push((Math.random()-0.5)*100, Math.random()*30, (Math.random()-0.5)*100);
    }
    fireflyGeo.setAttribute('position', new THREE.Float32BufferAttribute(fireflyPos, 3));
    const fireflyMat = new THREE.PointsMaterial({
        color: 0xfff59d, size: 0.4, transparent: true, blending: THREE.AdditiveBlending
    });
    fireflies = new THREE.Points(fireflyGeo, fireflyMat);
    scene.add(fireflies);

    // 5. FLORES DE CRISTAL (Los 5 Recuerdos)
    const flowerTexts = [
        "Nuestra primera mirada...",
        "Esa risa que me cambió la vida.",
        "Tu mano junto a la mía, siempre.",
        "Cada 30 de Octubre es un regalo.",
        "Te amo más allá de este jardín."
    ];

    for(let i=0; i<5; i++) {
        const group = new THREE.Group();
        
        // Tallo
        const stemGeo = new THREE.CylinderGeometry(0.1, 0.2, 4);
        const stemMat = new THREE.MeshPhongMaterial({ color: 0x224422 });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        stem.position.y = 2;
        group.add(stem);

        // Pétalos de Cristal
        const petalGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const petalMat = new THREE.MeshPhongMaterial({
            color: 0xffffff, emissive: 0xff80ab, emissiveIntensity: 1,
            transparent: true, opacity: 0.8, flatShading: true
        });
        const flowerHead = new THREE.Mesh(petalGeo, petalMat);
        flowerHead.position.y = 4.5;
        group.add(flowerHead);

        // Luz propia de la flor
        const fLight = new THREE.PointLight(0xff80ab, 2, 15);
        fLight.position.y = 5;
        group.add(fLight);

        const angle = (i / 5) * Math.PI * 2;
        group.position.set(Math.cos(angle) * 15, 0, Math.sin(angle) * 15);
        group.userData = { text: flowerTexts[i], active: false };
        
        scene.add(group);
        flowers.push(group);
    }

    // Interacción
    window.addEventListener('click', onClick);

    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').remove(), 2000);
        document.getElementById('ui-header').style.opacity = '1';
        document.getElementById('ui-header').style.transform = 'translateY(0)';
    }, 3000);
}

function onClick(event) {
    const mouse = new THREE.Vector2(
        (event.clientX / window.innerWidth) * 2 - 1,
        -(event.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    
    const intersects = raycaster.intersectObjects(flowers, true);
    if(intersects.length > 0) {
        let obj = intersects[0].object;
        while(obj.parent && obj.type !== 'Group') obj = obj.parent;
        revealMemory(obj);
    }
}

function revealMemory(flower) {
    const cap = document.getElementById('caption');
    cap.innerText = flower.userData.text;
    cap.style.opacity = '1';

    // Animación de cámara
    const targetPos = new THREE.Vector3().copy(flower.position).add(new THREE.Vector3(0, 6, 12));
    
    // Movimiento suave manual (sin librerías extra para evitar errores)
    const startPos = camera.position.clone();
    let t = 0;
    const interval = setInterval(() => {
        t += 0.02;
        camera.position.lerpVectors(startPos, targetPos, t);
        camera.lookAt(flower.position.x, 5, flower.position.z);
        if(t >= 1) clearInterval(interval);
    }, 16);

    // Efecto de brillo en la flor
    flower.children[1].material.emissiveIntensity = 5;
    setTimeout(() => {
        cap.style.opacity = '0';
        flower.children[1].material.emissiveIntensity = 1;
    }, 4000);
}

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    // Movimiento de luciérnagas
    if(fireflies) {
        fireflies.position.y = Math.sin(time * 0.5) * 2;
        fireflies.rotation.y += 0.001;
    }

    // Balanceo de flores
    flowers.forEach((f, i) => {
        f.rotation.y = Math.sin(time + i) * 0.1;
        f.children[1].rotation.z += 0.01;
        f.children[1].position.y = 4.5 + Math.sin(time * 2 + i) * 0.2;
    });

    controls.update();
    renderer.render(scene, camera);
}

init();
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
