<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el amor de mi vida</title>

    <style>
        /* --- EL ESPACIO PROFUNDO --- */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #020111 10%, #20124d 50%, #000022 100%);
            height: 100vh;
            color: white;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- LAS ESTRELLAS DEL FONDO --- */
        .estrella-fondo {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: titilar infinite alternate;
            z-index: 1;
        }
        @keyframes titilar {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px white; }
        }

        /* --- ESTRELLA FUGAZ --- */
        .estrella-fugaz {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
            animation: fugaz 6s linear infinite;
            z-index: 2;
            opacity: 0;
            transform: rotate(-45deg);
        }
        @keyframes fugaz {
            0% { top: -10%; left: 80%; opacity: 1; }
            20% { top: 110%; left: -20%; opacity: 0; }
            100% { opacity: 0; }
        }

        /* --- ENCABEZADO Y CONTADOR --- */
        .encabezado {
            text-align: center;
            position: absolute;
            top: 8%;
            width: 100%;
            z-index: 10;
            animation: flotarSuave 5s ease-in-out infinite;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            color: #fce788;
            text-shadow: 0 0 20px rgba(252, 231, 136, 0.6);
            margin-bottom: 5px;
            font-style: italic;
        }
        .contador-estelar {
            font-size: 1.3em;
            letter-spacing: 2px;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes flotarSuave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- BOTÓN DE MÚSICA --- */
        .btn-musica {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-family: 'Quicksand', sans-serif;
            transition: 0.3s;
        }
        .btn-musica:hover { background: rgba(255, 255, 255, 0.3); }

        /* --- ESTRELLAS MÁGICAS INTERACTIVAS --- */
        .estrella-magica {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #fff, #fce788);
            border-radius: 50%;
            box-shadow: 0 0 20px 5px rgba(252, 231, 136, 0.8);
            cursor: pointer;
            animation: latir 2s infinite alternate;
            z-index: 15;
            transition: 0.3s;
        }
        .estrella-magica:hover { transform: scale(1.6); box-shadow: 0 0 40px 15px rgba(252, 231, 136, 1); }
        @keyframes latir {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        #est1 { top: 35%; left: 15%; }
        #est2 { top: 65%; left: 25%; }
        #est3 { top: 45%; left: 75%; }
        #est4 { top: 75%; left: 65%; }

            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;

            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
