<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Gordita Preciosa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
--pink:#ff99cc;
--gold:#fccb90;
--love:#ff6b81;
}

body,html{
margin:0;
padding:0;
overflow:hidden;
font-family:'Quicksand';
background:#050505;
color:white;
}

/* Nebulosa */
#nebula{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#1b2735,#090a0f);
animation:move 15s infinite;
z-index:-2;
}
@keyframes move{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* Corazones flotando */
.heart{
position:absolute;
color:#ff6b81;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh)}
}

/* Título */
h1{
text-align:center;
margin-top:20px;
font-family:'Dancing Script';
color:var(--gold);
font-size:3rem;
animation:float 3s infinite;
}
@keyframes float{
50%{transform:translateY(-10px)}
}

/* contador */
#contador{
text-align:center;
margin-top:10px;
}

/* objetos */
.interactive-obj{
position:absolute;
font-size:3rem;
cursor:pointer;
transition:0.3s;
}
.interactive-obj:hover{
transform:scale(1.4);
}

/* botón final */
#final-letter-btn{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px;
border:none;
border-radius:30px;
background:var(--gold);
font-size:1.5rem;
cursor:pointer;
animation:pulse 2s infinite;
}
@keyframes pulse{
50%{transform:translate(-50%,-50%) scale(1.1)}
}

/* modal */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:350px;
text-align:center;
}

/* botón música */
#musicBtn{
position:fixed;
bottom:10px;
right:10px;
padding:10px;
border:none;
border-radius:20px;
background:var(--love);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="nebula"></div>

<h1>Nuestra Galaxia 💖</h1>
<div id="contador"></div>

<button id="musicBtn" onclick="toggleMusic()">🎵 Activar Música</button>

<audio id="music" loop>
<source src="cancion.mp3" type="audio/mpeg">
</audio>

<!-- objetos -->
<div class="interactive-obj" style="top:30%;left:20%" onclick="show(1)">💖</div>
<div class="interactive-obj" style="top:60%;left:30%" onclick="show(2)">🌟</div>
<div class="interactive-obj" style="top:40%;left:70%" onclick="show(3)">🎁</div>
<div class="interactive-obj" style="top:70%;left:75%" onclick="show(4)">📸</div>
<div class="interactive-obj" style="top:15%;left:60%" onclick="show(5)">💎</div>

<button id="final-letter-btn" onclick="finalMsg()">💌 Mensaje Final</button>

<div class="modal" id="modal">
<div class="modal-content" id="content"></div>
</div>

<script>

let found=0;

/* contador */
const start=new Date("Oct 30 2025").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=Math.floor((now-start)/86400000);
document.getElementById("contador").innerText="Llevamos "+d+" días juntos ❤️";
},1000);

/* corazones */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";
h.style.animationDuration=(Math.random()*5+3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},300);

/* música */
function toggleMusic(){
let m=document.getElementById("music");
m.play();
}

/* frases */
function show(n){
found++;
let c=document.getElementById("content");

if(n==1)c.innerHTML="Eres lo mejor que me ha pasado ❤️";
if(n==2)c.innerHTML="Mi lugar favorito eres tú 🌍";
if(n==3)c.innerHTML="Vale por besos ilimitados 💋";
if(n==4)c.innerHTML=`<img src="foto.jpg" width="100%"><p>Nuestro recuerdo 💖</p>`;
if(n==5)c.innerHTML="Quiero toda una vida contigo 💍";

c.innerHTML+="<br><button onclick='closeM()'>Cerrar</button>";
document.getElementById("modal").style.display="flex";

if(found>=5){
document.getElementById("final-letter-btn").style.display="block";
new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();
}
}

function closeM(){
document.getElementById("modal").style.display="none";
}

function finalMsg(){
document.getElementById("content").innerHTML=`
<h2>Mi amor ❤️</h2>
<p>No sabes lo feliz que soy contigo...<br><br>
Eres mi todo, mi paz, mi lugar seguro.<br><br>
Quiero seguir contigo mucho tiempo más 🥺<br><br>
<b>Te amo infinitamente ❤️</b></p>
<button onclick='closeM()'>Volver</button>
`;
document.getElementById("modal").style.display="flex";
}

</script>

</body>
</html>
