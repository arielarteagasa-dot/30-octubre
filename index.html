<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Gordita Preciosa ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff99cc;
            --purple: #d57eeb;
            --gold: #fccb90;
            --love: #ff6b81;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: white;
            perspective: 1000px;
            background: #050505;
        }

        #nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1b2735 0%, #090a0f 100%);
            background-size: 400% 400%;
            animation: nebulaMove 15s ease infinite;
        }

        @keyframes nebulaMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particle {
            position: absolute;
            background: white; border-radius: 50%;
            opacity: 0.6; filter: blur(2px);
            animation: floatParticle linear infinite; z-index: -1;
        }

        @keyframes floatParticle {
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        #ui-container {
            position: absolute; top: 5%; width: 100%; text-align: center;
            z-index: 10; pointer-events: none;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem; color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            margin: 0; animation: floatTitle 3s ease-in-out infinite;
        }

        @keyframes floatTitle {
            50% { transform: translateY(-10px); }
        }

        #contador {
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .interactive-obj {
            position: absolute; cursor: pointer; z-index: 5;
            font-size: 3rem;
        }

        #final-letter-btn {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px; background: var(--gold);
            border-radius: 50px;
            font-size: 2rem;
            cursor: pointer;
        }

        .modal {
            display: none; position: fixed;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: white; padding: 25px;
            border-radius: 20px;
            color: #333;
            max-width: 320px;
            text-align: center;
        }

        .modal img {
            width: 100%;
            border-radius: 10px;
        }

        .btn-close {
            background: var(--love);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            margin-top: 15px;
        }

        /* BOTÓN MÚSICA */
        #musicBtn{
            position:fixed;
            bottom:15px;
            right:15px;
            padding:10px;
            border:none;
            border-radius:20px;
            background:var(--love);
            color:white;
            cursor:pointer;
            z-index:999;
        }
    </style>
</head>

<body onmousemove="createTrail(event)" ontouchmove="createTrailTouch(event)">

<div id="nebula"></div>

<div id="ui-container">
    <h1>Nuestra Galaxia Mágica</h1>
    <div id="contador">00d 00h 00m 00s</div>
</div>

<!-- 🎵 MÚSICA -->
<button id="musicBtn" onclick="activarMusica()">🎵 Música</button>
<audio id="music" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div class="interactive-obj" style="top:30%; left:20%;" id="obj1" onclick="showSurprise(1)">💖</div>
<div class="interactive-obj" style="top:60%; left:30%;" id="obj2" onclick="showSurprise(2)">🌟</div>
<div class="interactive-obj" style="top:40%; left:70%;" id="obj3" onclick="showSurprise(3)">🎁</div>
<div class="interactive-obj" style="top:70%; left:75%;" id="obj4" onclick="showSurprise(4)">📜</div>
<div class="interactive-obj" style="top:15%; left:60%;" id="obj5" onclick="showSurprise(5)">💎</div>

<button id="final-letter-btn" onclick="showFinalLetter()">💌 Mensaje Final</button>

<div class="modal" id="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script>

const startDate = new Date('October 30, 2025').getTime();
let objectsFound = new Set();

/* contador */
setInterval(()=>{
    let now = new Date().getTime();
    let diff = now - startDate;
    let d = Math.floor(diff / 86400000);
    document.getElementById('contador').innerHTML = "Llevamos " + d + " días ❤️";
},1000);

/* 🎵 MÚSICA ARREGLADA */
function activarMusica(){
    let m = document.getElementById("music");
    m.volume = 0.5;
    m.play().then(()=>{
        document.getElementById("musicBtn").innerText="🎶 Sonando...";
    }).catch(()=>{
        alert("Toca la pantalla otra vez ❤️");
    });
}

/* auto activar música al tocar */
document.body.addEventListener("click", ()=>{
    let m = document.getElementById("music");
    if(m.paused){
        m.play().catch(()=>{});
    }
});

/* SORPRESAS */
function showSurprise(id){
    objectsFound.add(id);

    let content = "";

    if(id==4){
        content = `
        <h3>Nuestro recuerdo 💖</h3>
        <img src="foto.jpg" style="width:100%; border-radius:10px;">
        `;
    }else{
        content = "Te amo ❤️";
    }

    content += `<button class="btn-close" onclick="closeModal()">Cerrar</button>`;

    document.getElementById('modal-content').innerHTML = content;
    document.getElementById('modal').style.display = 'flex';

    if(objectsFound.size === 5){
        document.getElementById('final-letter-btn').style.display = 'block';
    }
}

function closeModal(){
    document.getElementById('modal').style.display = 'none';
}

function showFinalLetter(){
    alert("Te amo infinitamente ❤️");
}

</script>

</body>
</html>
