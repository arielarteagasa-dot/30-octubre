<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Natasha | 30 de Octubre</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;400&display=swap');

        body { margin: 0; overflow: hidden; background: #0a0112; font-family: 'Montserrat', sans-serif; color: white; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        .header h1 { font-family: 'Dancing Script', cursive; margin: 0; font-size: 3rem; color: #ff3377; text-shadow: 0 0 20px rgba(255, 51, 119, 0.8); }
        .fecha { letter-spacing: 6px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; }

        .contador-container { position: absolute; top: 40px; right: 40px; background: rgba(0,0,0,0.5); padding: 15px 25px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 51, 119, 0.3); text-align: center; }
        #timer { font-size: 1rem; font-weight: 200; color: #ffebf2; }

        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1.5s ease-out; }
        .loader-heart { font-size: 50px; color: #ff3377; animation: pulse 1s infinite; text-shadow: 0 0 20px #ff3377; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        #instrucciones { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-heart">❤</div>
    <p style="margin-top: 20px; letter-spacing: 4px; font-size: 11px;">CREANDO TU MUNDO, NATASHA...</p>
</div>

<div id="ui">
    <div class="header">
        <p class="fecha">Desde el 30 de Octubre</p>
        <h1>Para Mi Natasha</h1>
    </div>
    
    <div class="contador-container">
        <p style="margin: 0 0 5px 0; font-size: 0.6rem; letter-spacing: 2px; color: #ff3377;">TIEMPO A TU LADO</p>
        <div id="timer">Calculando...</div>
    </div>

    <div id="instrucciones">Toca el Nexo central para despertar el mundo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
let scene, camera, renderer, controls, dome, nexus, fireflies;
let cespedPatches = [];
let clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0112, 0.015);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 50, 100);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2 - 0.1;

    // Luces
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const mainLight = new THREE.PointLight(0xff3377, 2, 100);
    mainLight.position.set(0, 20, 0);
    scene.add(mainLight);

    // 1. EL NEXO (Corazón del mundo)
    const nexoGeo = new THREE.IcosahedronGeometry(5, 0);
    const nexoMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xff3377, emissiveIntensity: 2, wireframe: true });
    nexus = new THREE.Mesh(nexoGeo, nexoMat);
    nexus.position.y = 10;
    scene.add(nexus);

    // 2. EL DOMO (Protector)
    const domeGeo = new THREE.SphereGeometry(80, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshBasicMaterial({ color: 0x441144, wireframe: true, transparent: true, opacity: 0.1 });
    dome = new THREE.Mesh(domeGeo, domeMat);
    scene.add(dome);

    // 3. CÉSPED MATEMÁTICO (Sin archivos externos)
    const grassGeo = new THREE.ConeGeometry(0.2, 2, 3);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x1a052a, emissive: 0x000000 });
    
    for(let i=0; i<400; i++) {
        const blade = new THREE.Mesh(grassGeo, grassMat);
        const r = Math.random() * 70;
        const theta = Math.random() * Math.PI * 2;
        blade.position.set(Math.cos(theta)*r, 0, Math.sin(theta)*r);
        blade.rotation.y = Math.random() * Math.PI;
        blade.scale.y = 0.5 + Math.random() * 1.5;
        scene.add(blade);
        cespedPatches.push(blade);
    }

    // 4. LUCIÉRNAGAS
    const fGeo = new THREE.BufferGeometry();
    const fPos = [];
    for(let i=0; i<200; i++) fPos.push((Math.random()-0.5)*150, Math.random()*60, (Math.random()-0.5)*150);
    fGeo.setAttribute('position', new THREE.Float32BufferAttribute(fPos, 3));
    fireflies = new THREE.Points(fGeo, new THREE.PointsMaterial({color: 0xfff59d, size: 0.5, transparent: true}));
    scene.add(fireflies);

    // QUITAR LOADER (Con seguridad extra)
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        gsap.to(camera.position, { y: 20, z: 80, duration: 3, ease: "power2.inOut" });
        setTimeout(() => document.getElementById('loader').remove(), 1500);
    }, 2000);

    window.addEventListener('click', onInteraction);
    animate();
}

function onInteraction(e) {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(nexus);

    if(intersects.length > 0) {
        // EL DESPERTAR DEL MUNDO
        gsap.to(dome.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 2 });
        gsap.to(dome.material, { color: 0xff3377, opacity: 0.3, duration: 2 });
        gsap.to(nexus.rotation, { y: Math.PI * 4, duration: 2 });
        
        cespedPatches.forEach((b, i) => {
            gsap.to(b.material, { emissiveIntensity: 5, color: 0xff3377, delay: i*0.002, duration: 1 });
        });

        // Zoom cinemático
        gsap.to(camera.position, { z: 40, y: 15, duration: 2, ease: "back.out(1.7)" });
    }
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    
    nexus.rotation.y += 0.01;
    nexus.position.y = 10 + Math.sin(t) * 2;
    
    if(fireflies) {
        fireflies.position.y = Math.sin(t * 0.2) * 2;
        fireflies.rotation.y += 0.001;
    }

    controls.update();
    renderer.render(scene, camera);
}

// Contador
const fechaInicio = new Date("October 30, 2024 00:00:00").getTime();
setInterval(() => {
    const ahora = new Date().getTime();
    const dif = ahora - fechaInicio;
    const d = Math.floor(dif / (1000 * 60 * 60 * 24));
    const h = Math.floor((dif % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((dif % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((dif % (1000 * 60)) / 1000);
    document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}, 1000);

init();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
