<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        .room { position: relative; width: 600px; height: 400px; border: 5px solid #444; border-radius: 10px; background: #2c3e50; }
        .objeto { position: absolute; cursor: pointer; transition: 0.3s; font-size: 50px; }
        .objeto:hover { transform: scale(1.2); filter: drop-shadow(0 0 10px gold); }
        #mensaje { position: absolute; bottom: -80px; width: 100%; text-align: center; font-size: 20px; color: #ffccbc; }
        /* Posiciones */
        .camara { top: 50px; left: 100px; }
        .carta { bottom: 50px; right: 100px; }
        .cassette { top: 150px; left: 250px; }
    </style>
</head>
<body>
    <div class="room">
        <div class="objeto camara" onclick="mostrar('📸 Son recuerdos de nuestras mejores fotos...')">📸</div>
        <div class="objeto cassette" onclick="mostrar('🎵 Suena nuestra canción favorita en mi mente...')">📻</div>
        <div class="objeto carta" onclick="mostrar('✉️ Eres la carta de amor que siempre quise escribir.')">✉️</div>
        <div id="mensaje">Haz clic en los objetos de nuestro rincón...</div>
    </div>
    <script>
        function mostrar(txt) { document.getElementById('mensaje').innerText = txt; }
    </script>
</body>
</html>
