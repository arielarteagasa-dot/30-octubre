<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Niña Hermosa</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #020111; /* Fondo noche profunda */
            color: white;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Estrellitas de fondo */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: blink 2s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.2; } to { opacity: 1; } }

        /* Título y Contador */
        .header {
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #fce788;
            margin: 0;
            text-shadow: 0 0 15px rgba(252, 231, 136, 0.7);
        }
        #contador {
            font-size: 1.2rem;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Estrellas Interactivas */
        .magic-star {
            position: absolute;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 20;
            filter: drop-shadow(0 0 10px #fce788);
            transition: transform 0.3s;
        }
        .magic-star:hover { transform: scale(1.5); }

        /* Modal (Ventana flotante) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            max-width: 300px;
            color: #333;
            animation: zoom 0.3s ease-out;
        }
        @keyframes zoom { from { transform: scale(0); } to { transform: scale(1); } }
        
        .polaroid img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .modal-text {
            margin-top: 15px;
            font-weight: 500;
        }
        .close-btn {
            margin-top: 15px;
            background: #be185d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Nuestra Historia</h1>
        <div id="contador">Calculando...</div>
    </div>

    <div class="magic-star" style="top:30%; left:20%;" onclick="show('https://picsum.photos/300/300?random=1', 'Eres lo mejor que me ha pasado.')">✨</div>
    <div class="magic-star" style="top:60%; left:30%;" onclick="show('https://picsum.photos/300/300?random=2', 'Me encanta cada segundo a tu lado.')">✨</div>
    <div class="magic-star" style="top:40%; left:70%;" onclick="show('https://picsum.photos/300/300?random=3', 'Gracias por elegirme siempre.')">✨</div>
    <div class="magic-star" style="top:70%; left:75%;" onclick="show('https://picsum.photos/300/300?random=4', '¡Feliz Aniversario, mi vida!')">✨</div>

    <div class="modal" id="box">
        <div class="modal-content">
            <div class="polaroid">
                <img id="img" src="" alt="foto">
            </div>
            <p id="msg" class="modal-text"></p>
            <button class="close-btn" onclick="document.getElementById('box').style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
        // 1. Crear cielo estrellado automático
        for (let i = 0; i < 80; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 3 + 'px';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(s);
        }

        // 2. Lógica del Contador (30 Oct 2025)
        const start = new Date('October 30, 2025 00:00:00').getTime();
        function update() {
            const now = new Date().getTime();
            const diff = now - start;
            
            // Si la fecha aún no llega
            if(diff < 0) {
                document.getElementById('contador').innerHTML = "Faltan pocos días para nuestro día...";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('contador').innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(update, 1000);
        update();

        // 3. Función para mostrar mensajes
        function show(url, text) {
            document.getElementById('img').src = url;
            document.getElementById('msg').innerText = text;
            document.getElementById('box').style.display = 'flex';
        }
    </script>
</body>
</html>
