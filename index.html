<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo para Natasha | 30 de Octubre</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;400;600&display=swap');

        body { margin: 0; overflow: hidden; background: #050010; font-family: 'Montserrat', sans-serif; color: white; }
        
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        .header h1 { font-family: 'Dancing Script', cursive; margin: 0; font-size: 3.5rem; color: #ff3377; text-shadow: 0 0 25px rgba(255, 51, 119, 0.9); }
        .fecha-universo { letter-spacing: 10px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); text-transform: uppercase; }

        .contador-card { position: absolute; bottom: 40px; left: 40px; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 51, 119, 0.3); text-align: center; }
        #timer { font-size: 1.1rem; font-weight: 200; color: #ffebf2; letter-spacing: 1px;}

        /* Cargador con salida de emergencia */
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease-out; }
        .loader-heart { font-size: 50px; color: #ff3377; animation: pulse 1s infinite; text-shadow: 0 0 20px #ff3377; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        #caption-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 80%; font-size: 1.5rem; font-style: italic; color: #ffebf2; text-shadow: 0 0 15px rgba(0,0,0,0.8); opacity: 0; transition: opacity 0.8s; pointer-events: none; }
        
        #instrucciones { position: absolute; top: 130px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 9px; letter-spacing: 3px; text-transform: uppercase;}
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-heart">❤</div>
    <p style="margin-top: 20px; letter-spacing: 4px; font-size: 10px; color: #ff3377;">CARGANDO TU UNIVERSO...</p>
</div>

<div id="ui-layer">
    <div class="header">
        <p class="fecha-universo">Desde el 30 de Octubre</p>
        <h1>Para Mi Natasha</h1>
    </div>
    
    <div id="instrucciones">Toca el Corazón Central</div>
    <div id="caption-box"></div>

    <div class="contador-card">
        <p style="margin: 0 0 5px 0; font-size: 0.6rem; letter-spacing: 2px; color: #ff3377;">TIEMPO A TU LADO</p>
        <div id="timer">Iniciando...</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
let scene, camera, renderer, controls, fireflies, heartParticles;
let clock = new THREE.Clock();

function init() {
    try {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050010, 0.01);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 100);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // Estrellas de fondo
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<15000; i++) starPos.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*400);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.2})));

        // Corazón de Partículas
        heartParticles = createHeart(3000);
        scene.add(heartParticles);

        window.addEventListener('click', onInteract);
        animate();

        // SALIDA DE EMERGENCIA DEL LOADER: Pase lo que pase, a los 3 seg se quita
        setTimeout(removeLoader, 3000);

    } catch(e) {
        console.error(e);
        removeLoader(); // Quitar loader si hay error para no dejar pantalla negra
    }
}

function createHeart(count) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        const z = (Math.random() - 0.5) * 8;
        pos[i*3] = x * 1.2;
        pos[i*3+1] = y * 1.2;
        pos[i*3+2] = z;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({color: 0xff3377, size: 0.6, blending: THREE.AdditiveBlending, transparent: true}));
}

function removeLoader() {
    const loader = document.getElementById('loader');
    if(loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 1000);
    }
}

const frases = ["Eres mi universo entero ❤️", "Cada segundo a tu lado es magia", "30 de Octubre: Mi día favorito", "Te amo más de lo que las palabras dicen"];

function onInteract(e) {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(mouse, camera);
    
    if(ray.intersectObject(heartParticles).length > 0) {
        const cap = document.getElementById('caption-box');
        cap.innerText = frases[Math.floor(Math.random()*frases.length)];
        cap.style.opacity = '1';
        
        gsap.to(heartParticles.scale, {x: 1.5, y: 1.5, z: 1.5, duration: 0.5, yoyo: true, repeat: 1});
        setTimeout(() => cap.style.opacity = '0', 3000);
    }
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    heartParticles.rotation.y += 0.01;
    heartParticles.scale.setScalar(1 + Math.sin(t*3)*0.05);
    controls.update();
    renderer.render(scene, camera);
}

// Contador
const inicio = new Date("October 30, 2024 00:00:00").getTime();
setInterval(() => {
    const dif = new Date().getTime() - inicio;
    const d = Math.floor(dif / 86400000);
    const h = Math.floor((dif % 86400000) / 3600000);
    const m = Math.floor((dif % 3600000) / 60000);
    const s = Math.floor((dif % 60000) / 1000);
    document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}, 1000);

init();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
