<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aniversario 30 - Natasha</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a0a1f, #000); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .texto-centro { position: absolute; top: 10%; width: 100%; text-align: center; color: #ff99cc; font-size: 2.5rem; text-shadow: 0 0 15px #ff4d94; opacity: 0; transition: 2s; }
        #instrucciones { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; }
        .boton-amor { 
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; background: #ff4d94; color: white; border: none; 
            border-radius: 50px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 20px #ff4d94; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="titulo" class="texto-centro">30 de Octubre: Nuestro Eterno Presente</div>
    <button id="btnFinal" class="boton-amor" onclick="alert('¡Feliz Aniversario, Mi Vida! ❤️')">Nuestra Promesa</button>
    <div id="instrucciones">Arrastra para girar | Rueda para zoom | Toca los cristales</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
// CONFIGURACIÓN BÁSICA
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.enableDamping = true;

// LUCES MÁGICAS
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff0077, 2, 100);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// FONTO: NIEBLA Y PARTÍCULAS
scene.fog = new THREE.FogExp2(0x1a0a1f, 0.05);

const partGeo = new THREE.BufferGeometry();
const partCount = 1500;
const posArray = new Float32Array(partCount * 3);
for(let i=0; i<partCount*3; i++) posArray[i] = (Math.random()-0.5) * 20;
partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const partMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff, transparent: true, opacity: 0.8 });
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// CARGAR MODELO 3D (Ejemplo: Un diamante o corazón refinado)
// Nota: Usamos una geometría nativa de Three.js para asegurar que funcione sin fallos de carga externos
const crystalGeo = new THREE.IcosahedronGeometry(1, 0);
const crystalMat = new THREE.MeshPhongMaterial({
    color: 0xff99cc,
    emissive: 0x220011,
    shininess: 100,
    flatShading: true,
    transparent: true,
    opacity: 0.9
});

const cristales = [];
for(let i=0; i<8; i++) {
    const mesh = new THREE.Mesh(crystalGeo, crystalMat);
    const angle = (i / 8) * Math.PI * 2;
    mesh.position.set(Math.cos(angle) * 3, Math.sin(i) * 1, Math.sin(angle) * 3);
    mesh.scale.set(0.5, 0.5, 0.5);
    scene.add(mesh);
    cristales.push(mesh);
}

// INTERACCIÓN
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(cristales);
    
    if (intersects.length > 0) {
        const obj = intersects[0].object;
        obj.scale.set(1, 1, 1);
        document.getElementById('titulo').style.opacity = "1";
        document.getElementById('btnFinal').style.display = "block";
        
        // Efecto de color al tocar
        obj.material.color.setHex(Math.random() * 0xffffff);
    }
});

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    
    cristales.forEach((c, i) => {
        c.rotation.y += 0.01;
        c.position.y += Math.sin(time + i) * 0.005;
    });
    
    particles.rotation.y += 0.001;
    
    controls.update();
    renderer.render(scene, camera);
}

animate();

// Ajuste de pantalla
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
