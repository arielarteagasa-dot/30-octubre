<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Estrella Favorita ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff99cc;
            --purple: #d57eeb;
            --gold: #fccb90;
            --love: #ff6b81;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: white;
            perspective: 1000px;
        }

        /* --- FONDO EN MOVIMIENTO CONSTANTE (NO NEGRO) --- */
        #moving-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-image: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- PARTÍCULAS BRILLANTES FLOTANTES --- */
        .particle {
            position: absolute;
            background: white; border-radius: 50%;
            opacity: 0.6; filter: blur(2px);
            animation: floatParticle linear infinite; z-index: -1;
        }

        @keyframes floatParticle {
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* --- INTERFAZ FLOTANTE (UI) --- */
        #ui-container {
            position: absolute; top: 5%; width: 100%; text-align: center;
            z-index: 10; pointer-events: none;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3.2rem; color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.7);
            margin: 0; animation: floatTitle 3s ease-in-out infinite;
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #contador {
            margin-top: 15px; font-weight: 700; letter-spacing: 1px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px; border-radius: 50px;
            backdrop-filter: blur(5px); display: inline-block;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .love-meter-box {
            margin-top: 15px; font-size: 0.9rem;
        }

        .love-bar {
            width: 250px; height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 5px auto;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        #love-bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #ff99cc, var(--love));
            transition: width 0.5s ease;
            box-shadow: 0 0 15px var(--love);
        }

        /* --- OBJETOS INTERACTIVOS (Búsqueda Divertida) --- */
        .interactive-obj {
            position: absolute; cursor: pointer; z-index: 5;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 3rem; user-select: none;
            filter: drop-shadow(0 0 10px white);
        }

        .interactive-obj:hover { transform: scale(1.4) rotate(15deg); filter: drop-shadow(0 0 20px var(--love)); }

        #final-heart {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem; color: var(--love);
            filter: drop-shadow(0 0 30px var(--love));
            cursor: pointer; z-index: 50; animation: beat 1.5s infinite;
        }

        @keyframes beat { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

        /* --- MODALES (Ventanas Emergentes) --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .modal-content {
            background: white; padding: 25px; border-radius: 20px;
            text-align: center; color: #333; max-width: 320px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            animation: popIn 0.4s ease-out;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        
        .polaroid img { width: 100%; height: auto; border-radius: 10px; border: 10px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-text { margin-top: 20px; font-weight: 500; font-size: 1.1rem; line-height: 1.5; }
        
        .trivia-btn {
            background: rgba(0,0,0,0.1); border: none; padding: 10px 20px; margin: 5px;
            border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .trivia-btn:hover { background: var(--pink); color: white; }

        .btn-close {
            background: var(--love); color: white; border: none;
            padding: 10px 25px; border-radius: 20px; font-weight: 700;
            cursor: pointer; margin-top: 20px;
        }

        /* --- EFECTO DE CARTA FINAL --- */
        #final-letter-modal {
            max-width: 450px; background: white; color: #333; text-align: left;
        }
    </style>
</head>
<body onmousemove="createHeartTrail(event)" ontouchmove="createHeartTrailTouch(event)">

    <div id="moving-bg"></div>

    <div id="ui-container">
        <h1>Universo de Nosotros</h1>
        <div class="love-meter-box">
            <div id="status-text">Lléname de amor explorando...</div>
            <div class="love-bar"><div id="love-bar-fill"></div></div>
        </div>
        <div id="contador">Calculando nuestro tiempo...</div>
        <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 15px; pointer-events: none;">Toca los 5 objetos ocultos</p>
    </div>

    <div class="interactive-obj" style="top:30%; left:20%;" id="obj1" onclick="showSurprise(1, '💖')">💖</div>
    <div class="interactive-obj" style="top:60%; left:30%;" id="obj2" onclick="showSurprise(2, '🌟')">🌟</div>
    <div class="interactive-obj" style="top:40%; left:70%;" id="obj3" onclick="showSurprise(3, '🎁')">🎁</div>
    <div class="interactive-obj" style="top:70%; left:75%;" id="obj4" onclick="showSurprise(4, '📜')">📜</div>
    <div class="interactive-obj" style="top:15%; left:60%;" id="obj5" onclick="showSurprise(5, '💎')">💎</div>

    <div id="final-heart" onclick="showFinalLetter()">❤️</div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modal-content">
            </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN INICIAL ---
        // Fecha de Aniversario: 30 Oct 2025
        const startDate = new Date('October 30, 2025 00:00:00').getTime();
        let objectsFound = new Set();
        const totalObjects = 5;

        // --- 2. FONDO Y EFECTOS ---
        // Crear partículas brillantes del fondo
        const body = document.body;
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 6 + 2 + 'px';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 3 + 2 + 's';
            p.style.animationDelay = Math.random() * 2 + 's';
            body.appendChild(p);
        }

        // Crear rastro de corazones en el cursor
        function createHeartTrail(e) {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.style.position = 'absolute';
            h.style.color = 'white';
            h.style.pointerEvents = 'none';
            h.style.left = e.pageX + 'px';
            h.style.top = e.pageY + 'px';
            h.style.animation = 'heartFade 1s linear forwards';
            h.style.zIndex = '1000';
            body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }
        function createHeartTrailTouch(e) {
            createHeartTrail(e.touches[0]);
        }
        // CSS para el rastro
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes heartFade {
                0% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0px); }
                100% { transform: translateY(-50px) scale(1.5); opacity: 0; filter: blur(2px); }
            }
        `;
        document.head.appendChild(style);

        // --- 3. LÓGICA DE TIEMPO (CONTADOR) ---
        function updateCounter() {
            const now = new Date().getTime();
            const diff = now - startDate;
            
            // Si la fecha aún no llega
            if(diff < 0) {
                document.getElementById('contador').innerHTML = "Faltan pocos días para nuestro día...";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('contador').innerHTML = `Llevamos: ${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(updateCounter, 1000);
        updateCounter();

        // --- 4. LÓGICA DE JUEGO (BÚSQUEDA) ---
        function showSurprise(id, type) {
            objectsFound.add(id);
            const fillPercentage = (objectsFound.size / totalObjects) * 100;
            document.getElementById('love-bar-fill').style.width = fillPercentage + '%';
            document.getElementById('obj'+id).style.opacity = '0.3'; // Marcar como visitado

            let content = '';
            if (id === 1) { // Cumplido Divertido
                content = `
                    <div class="polaroid">
                        <img src="https://images.unsplash.com/photo-1513279922550-250c2129b13a?auto=format&fit=crop&w=400&q=80" alt="amor">
                    </div>
                    <p class="modal-text">No eres de este planeta... <br> ¡Eres mi alien favorita! 🔥💘</p>
                    <button class="btn-close" onclick="closeModal()">Seguir Explorando</button>
                `;
            } else if (id === 2) { // Trivia Romántica
                content = `
                    <p class="modal-text">Mini-Trivia de Nosotros 🤔<br><br><b>¿Cuál fue nuestro primer viaje juntos?</b></p>
                    <button class="trivia-btn" onclick="checkTrivia(true)">La playa / Un pueblito</button>
                    <button class="trivia-btn" onclick="checkTrivia(false)">Al cine / Al centro</button>
                    <p id="trivia-feedback" style="margin-top:10px;"></p>
                    <button class="btn-close" id="trivia-close" style="display:none;" onclick="closeModal()">Seguir Explorando</button>
                `;
            } else if (id === 3) { // Cupón de Amor
                content = `
                    <p class="modal-text" style="color:var(--love); font-weight:700;">¡Has ganado un Cupón de Amor! 🎫</p>
                    <p class="modal-text">Vale por: Un beso de 10 segundos y un abrazo apretadito.</p>
                    <p style="font-size:0.8rem; opacity:0.7;">(Toma captura para canjearlo 😉)</p>
                    <button class="btn-close" onclick="closeModal()">Seguir Explorando</button>
                `;
            } else if (id === 4) { // Recuerdo Foto
                content = `
                    <div class="polaroid">
                        <img src="https://images.unsplash.com/photo-1521190469-42b932c1c686?auto=format&fit=crop&w=400&q=80" alt="viaje">
                    </div>
                    <p class="modal-text">Me encanta recordar cuando fuimos allí. ¡Fue increíble a tu lado! 🚀✨</p>
                    <button class="btn-close" onclick="closeModal()">Seguir Explorando</button>
                `;
            } else if (id === 5) { // Cumplido Lindo
                content = `
                    <p class="modal-text">Un secreto... 🤫<br><br>Tu sonrisa tiene el poder de arreglar cualquiera de mis días malos. ¡Te amo infinito!</p>
                    <button class="btn-close" onclick="closeModal()">Seguir Explorando</button>
                `;
            }
            
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('modal').style.display = 'flex';

            if(objectsFound.size === totalObjects) {
                document.getElementById('status-text').innerHTML = "¡AMOR COMPLETO! ❤️ Mira el centro...";
                setTimeout(() => {
                    document.getElementById('final-heart').style.display = 'block';
                }, 1000);
            } else {
                document.getElementById('status-text').innerHTML = `Has encontrado ${objectsFound.size} de ${totalObjects} tesoros...`;
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function checkTrivia(isCorrect) {
            const fb = document.getElementById('trivia-feedback');
            if (isCorrect) {
                fb.innerHTML = "¡Correcto mi vida! ❤️ No lo olvidaste.";
                fb.style.color = '#2ecc71';
                document.getElementById('trivia-close').style.display = 'inline-block';
            } else {
                fb.innerHTML = "¡Ups! Casi... Intenta de nuevo😘";
                fb.style.color = '#e74c3c';
            }
        }

        function showFinalLetter() {
            let finalContent = `
                <h1 style="font-family:'Pacifico'; color:var(--love);">¡Feliz Aniversario Mi Vida!</h1>
                <p class="modal-text" style="font-size:1rem; text-align:left;">
                    Mi niña hermosa,<br><br>
                    No puedo creer que ya haya pasado tanto tiempo desde ese 30 de octubre de 2025. Cada día a tu lado ha sido una aventura increíble, llena de risas, apoyo y un amor que no para de crecer.<br><br>
                    Eres mi compañera, mi mejor amiga y el amor de mi vida. Gracias por hacerme tan feliz.<br><br>
                    Prometo seguir cuidándote y amándote todos los días. Prepárate, porque hoy vamos a celebrar en grande. ¡Eres lo más valioso que tengo!<br><br>
                    Te amo infinito,<br>
                    [Tu Nombre] ❤️
                </p>
                <button class="btn-close" onclick="location.reload()">Te Amo ❤️ (Volver)</button>
            `;
            document.getElementById('modal-content').innerHTML = finalContent;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
