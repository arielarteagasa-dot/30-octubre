<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi pedacito de cielo ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color1: #ff0080;
            --color2: #7000ff;
            --color3: #00d4ff;
            --gold: #ffd700;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Quicksand', sans-serif;
            color: white;
        }

        /* --- FONDO DE NEBULOSA ANIMADA --- */
        .nebula-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0b2e, #050505);
        }
        
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: var(--color1);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.3;
            animation: move 20s infinite alternate;
        }
        .blob.two { background: var(--color2); animation-delay: -5s; left: 50%; }
        .blob.three { background: var(--color3); animation-delay: -10s; top: 50%; }

        @keyframes move {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(40%, 40%) scale(1.5); }
        }

        /* --- INTERFAZ FLOTANTE --- */
        .header {
            position: absolute; top: 30px; width: 100%; text-align: center;
            z-index: 100; pointer-events: none;
        }
        
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem; color: var(--gold);
            margin: 0; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- BARRA DE AMOR ESTILO NEÓN --- */
        .love-ui { margin-top: 15px; }
        .progress-container {
            width: 280px; height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px; margin: 10px auto;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        #bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--color1), var(--color3));
            box-shadow: 0 0 20px var(--color1);
            transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- CONTADOR --- */
        #timer {
            font-size: 1rem; background: rgba(0,0,0,0.4);
            padding: 5px 20px; border-radius: 30px;
            backdrop-filter: blur(10px); display: inline-block;
            border: 1px solid var(--color1);
        }

        /* --- OBJETOS EN MOVIMIENTO (MEMORIAS) --- */
        .memory-item {
            position: absolute; cursor: pointer; z-index: 50;
            font-size: 3rem; user-select: none;
            filter: drop-shadow(0 0 10px white);
            transition: all 0.4s ease;
        }
        .memory-item:hover { transform: scale(1.5) rotate(15deg); filter: drop-shadow(0 0 25px var(--gold)); }

        /* --- RASTRO DE CORAZONES --- */
        .heart-particle {
            position: absolute; color: var(--color1);
            pointer-events: none; animation: fly 1.5s linear forwards;
            font-size: 1.5rem; z-index: 1000;
        }
        @keyframes fly {
            0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0) rotate(360deg); opacity: 0; }
        }

        /* --- MODAL POLAROID --- */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .card {
            background: white; padding: 15px; border-radius: 5px;
            width: 300px; text-align: center; color: #333;
            transform: scale(0); transition: 0.5s;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 3px; }
        .card p { font-size: 1.2rem; margin: 15px 0 5px; font-weight: 600; }
        .btn-close {
            background: var(--color1); color: white; border: none;
            padding: 10px 20px; border-radius: 50px; cursor: pointer;
            margin-top: 10px; width: 100%; font-weight: bold;
        }

        /* --- BOTÓN FINAL --- */
        #btn-final {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px; border: none; border-radius: 50px;
            background: var(--gold); color: black; font-family: 'Dancing Script';
            font-size: 2rem; cursor: pointer; z-index: 100;
            box-shadow: 0 0 40px var(--gold);
            animation: pulse 2s infinite;
        }
