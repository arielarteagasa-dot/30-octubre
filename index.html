<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuario de Recuerdos | Natasha | 30 de Octubre</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;400;600&display=swap');

        body { margin: 0; overflow: hidden; background: #0a0112; font-family: 'Montserrat', sans-serif; color: white; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        /* Encabezado */
        .header h1 { font-family: 'Dancing Script', cursive; margin: 0; font-size: 3.2rem; color: #ff3377; text-shadow: 0 0 20px rgba(255, 51, 119, 0.8); }
        .fecha { letter-spacing: 7px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; margin-bottom: 5px;}

        /* Contador Mejor Puesto (Abajo Izquierda) */
        .contador-card { position: absolute; bottom: 40px; left: 40px; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 51, 119, 0.3); text-align: center; }
        #timer { font-size: 1.1rem; font-weight: 200; color: #ffebf2; letter-spacing: 1px;}

        /* Cargador */
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease-out; }
        .loader-heart { font-size: 50px; color: #ff3377; animation: pulse 1s infiniteEaseInOut; text-shadow: 0 0 20px #ff3377; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        /* Mensaje Revelado */
        #caption-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 60%; font-size: 1.5rem; font-style: italic; color: #ffebf2; text-shadow: 0 0 10px rgba(0,0,0,0.5); opacity: 0; transition: opacity 1s; padding: 20px; border-radius: 10px; }
        
        #instrucciones { position: absolute; top: 120px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;}
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-heart">❤</div>
    <p style="margin-top: 20px; letter-spacing: 5px; font-size: 10px; color: #ff3377;">CREANDO MUNDO VOLUMÉTRICO</p>
</div>

<div id="ui-layer">
    <div class="header">
        <p class="fecha">Desde el 30 de Octubre</p>
        <h1>Para Mi Natasha</h1>
    </div>
    
    <div id="instrucciones">Utiliza el mouse para orbitar | Haz clic en el Nexo central</div>
    <div id="caption-box"></div>

    <div class="contador-card">
        <p style="margin: 0 0 10px 0; font-size: 0.7rem; letter-spacing: 2px;">TIEMPO A TU LADO</p>
        <div id="timer">Calculando eternidad...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
let scene, camera, renderer, controls, dome, nexus, fireflies;
let cespedPatches = [], hongoDecorations = [];
let clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0112, 0.015);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 80); // Vista cinemática alta

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2 - 0.1;

    // 1. ILUMINACIÓN VOLUMÉTRICA (El mundo asombroso)
    scene.add(new THREE.AmbientLight(0x0a0112, 1));
    const pointL = new THREE.PointLight(0xff3377, 4, 100);
    pointL.position.set(0, 30, 0);
    scene.add(pointL);

    // Niebla profunda
    scene.add(new THREE.HemisphereLight(0xff99cc, 0x0000ff, 0.8));

    // 2. EL OBJETO CENTRAL CON SIGNIFICADO: NEXO DOME
    const nexoDomeGeo = new THREE.IcosahedronGeometry(7, 1);
    const nexoDomeMat = new THREE.MeshPhongMaterial({
        color: 0x441144, wireframe: true, transparent: true, opacity: 0.05
    });
    dome = new THREE.Mesh(nexoDomeGeo, nexoDomeMat);
    dome.position.y = 15;
    scene.add(dome);

    const coreGeo = new THREE.OctahedronGeometry(2, 0);
    const coreMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, emissive: 0xff3377, emissiveIntensity: 2, flatShading: true
    });
    nexus = new THREE.Mesh(coreGeo, coreMat);
    dome.add(nexus); // El núcleo gira dentro del domo

    // 3. CÉSPED NEÓN (600 parches)
    const grassGeo = new THREE.CylinderGeometry(0.1, 0.3, 2, 4);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x051a05, emissive: 0x1a0a2a, emissiveIntensity: 1 });

    for(let i=0; i<600; i++) {
        const blade = new THREE.Mesh(grassGeo, grassMat);
        blade.position.set((Math.random()-0.5)*150, 0, (Math.random()-0.5)*150);
        blade.rotation.y = Math.random() * Math.PI;
        blade.scale.y = 1 + Math.random()*2;
        scene.add(blade);
        cespedPatches.push(blade);
    }

    // 4. HONGOS DECORATIVOS Bioluminiscentes (120 unidades)
    const hongoMat = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x00ffff, emissiveIntensity: 0.5 });
    for(let i=0; i<120; i++) {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 2), new THREE.MeshPhongMaterial({color: 0xeeeeee}))); // Tallo
        g.add(new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 8, 0, Math.PI*2, 0, Math.PI/2), hongoMat)); // Sombrero
        g.children[1].position.y = 1.2;
        g.position.set((Math.random()-0.5)*130, 0, (Math.random()-0.5)*130);
        scene.add(g);
        hongoDecorations.push(g);
    }

    // 5. LUCIÉRNAGAS
    const fGeo = new THREE.BufferGeometry();
    const fPos = [];
    for(let i=0; i<300; i++) fPos.push((Math.random()-0.5)*180, Math.random()*50, (Math.random()-0.5)*180);
    fGeo.setAttribute('position', new THREE.Float32BufferAttribute(fPos, 3));
    fireflies = new THREE.Points(fGeo, new THREE.PointsMaterial({color: 0xfff59d, size: 0.6, transparent: true}));
    scene.add(fireflies);

    // Arrancar la experiencia cinemática
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').remove(), 1000);
        gsap.to(camera.position, {y: 15, z: 60, duration: 4, ease: "power2.inOut"});
    }, 2000);

    window.addEventListener('click', onClick);
    animate();
}

// LÓGICA DE INTERACCIÓN: REVELAR MENSAJES DE NATASHA
const mensajesNexo = [
    "Ese 30 de Octubre cambió mi mundo... Gracias por elegirme. ❤️",
    "Tu risa es la melodía que alegra mis días. Te amo cada segundo.",
    "Cada momento contigo es un regalo que atesoro. Nuestro amor es eterno.",
    "Gracias por ser mi paz y mi aventura. Te amo hoy, mañana y siempre.",
    "Eres mi persona favorita en el mundo. ¡Por muchos octubres más!"
];

function onClick(e) {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(dome);
    
    if(intersects.length > 0) {
        // Cinemática Asombrosa (AAA Ambition)
        const tl = gsap.timeline();
        
        // 1. Viaje Cinematográfico al Nexo
        tl.to(camera.position, {
            x: dome.position.x * 1.3, y: 18, z: dome.position.z * 1.3,
            duration: 2, ease: "power3.inOut",
            onUpdate: () => camera.lookAt(dome.position.x, 8, dome.position.z)
        });

        // 2. Revelar Mensaje y Aurora (Adiós al Vacío)
        tl.call(() => {
            const cap = document.getElementById('caption-box');
            cap.innerText = mensajesNexo[Math.floor(Math.random() * mensajesNexo.length)];
            cap.style.opacity = '1';
            
            // Efecto Bloom de Aurora en el mundo
            const l = scene.children.find(c => c.isPointLight);
            gsap.to(l, { intensity: 10, duration: 0.5 });
            gsap.to(scene.fog, { color: 0xff3377, duration: 0.5 });
            gsap.to(dome.scale, { x: 1.5, y: 1.5, z: 1.5, duration: 0.5 }); // El nexo se abre
        });

        // Regresar cámara y ocultar texto
        setTimeout(() => {
            tl.to('#caption-box', {opacity: 0, duration: 1});
            tl.to(camera.position, {x:0, y:15, z:60, duration: 3, ease: "power2.inOut"});
            tl.call(() => {
                 gsap.to(scene.fog, { color: 0x0a0112, duration: 1 });
                 gsap.to(scene.children.find(c => c.isPointLight), { intensity: 4, duration: 1 });
                 gsap.to(dome.scale, { x: 1, y: 1, z: 1, duration: 1 });
            });
        }, 6000);
    }
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Movimiento orgánico de luciérnagas
    if(fireflies) {
        fireflies.position.y = Math.sin(t * 0.3) * 3;
        fireflies.rotation.y += 0.0003;
    }

    // Animación de césped (Balanceo suave)
    cespedPatches.forEach((c, i) => {
        c.rotation.z = Math.sin(t*0.5 + i) * 0.05;
        c.scale.y = 1.5 + Math.sin(t*2+i*0.1)*0.5;
    });

    // Girar el Nexo
    dome.rotation.y += 0.005;
    nexus.rotation.x += 0.01;
    
    controls.update();
    renderer.render(scene, camera);
}

// 7. Lógica del Contador (Desde el 30 de Octubre 2024)
const fechaInicio = new Date("October 30, 2024 00:00:00").getTime();
function updateTimer() {
    const ahora = new Date().getTime();
    const diferencia = ahora - fechaInicio;
    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
    document.getElementById("timer").innerHTML = `${dias}d ${horas}h ${minutos}m ${segundos}s`;
}
setInterval(updateTimer, 1000);
updateTimer();

init();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
