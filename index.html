<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Natasha | 140 Días de Magia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;400;600&display=swap');

        body { margin: 0; overflow: hidden; background: #020008; font-family: 'Montserrat', sans-serif; color: white; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        
        .header h1 { font-family: 'Dancing Script', cursive; margin: 0; font-size: 3.5rem; color: #ff3377; text-shadow: 0 0 30px rgba(255, 51, 119, 0.8); }
        .fecha-universo { letter-spacing: 8px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; }

        /* Contador Estilizado */
        .contador-card { position: absolute; bottom: 40px; left: 40px; background: rgba(255, 255, 255, 0.05); padding: 20px 35px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 51, 119, 0.3); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #timer { font-size: 1.3rem; font-weight: 200; color: #fff; letter-spacing: 2px;}
        .label-timer { font-size: 0.6rem; letter-spacing: 3px; color: #ff3377; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s; }
        .loader-heart { font-size: 60px; color: #ff3377; animation: beat 1.2s infinite ease-in-out; }
        @keyframes beat { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        #caption-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 70%; font-size: 1.8rem; font-style: italic; color: #ffebf2; text-shadow: 0 0 20px rgba(255, 51, 119, 0.6); opacity: 0; transition: opacity 0.8s; pointer-events: none; line-height: 1.4; }
        #instrucciones { position: absolute; top: 140px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 9px; letter-spacing: 4px; text-transform: uppercase;}
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-heart">❤</div>
    <p style="margin-top: 25px; letter-spacing: 6px; font-size: 10px; color: #ff3377;">ALINEANDO LAS ESTRELLAS PARA TI</p>
</div>

<div id="ui-layer">
    <div class="header">
        <p class="fecha-universo">Desde el 30 de Octubre</p>
        <h1>Para Mi Natasha</h1>
    </div>
    
    <div id="instrucciones">Toca el corazón para descubrir mensajes</div>
    <div id="caption-box"></div>

    <div class="contador-card">
        <div class="label-timer">Nuestra Historia Lleva</div>
        <div id="timer">Cargando tiempo...</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
let scene, camera, renderer, starSystem, heartSystem, shootingStar;
let clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 100;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 1. Fondo de Estrellas Profundo
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for(let i=0; i<20000; i++) starPos.push((Math.random()-0.5)*500, (Math.random()-0.5)*500, (Math.random()-0.5)*500);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    starSystem = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8}));
    scene.add(starSystem);

    // 2. Corazón de Partículas (Mejorado)
    heartSystem = createHeart();
    scene.add(heartSystem);

    // 3. Estrella Fugaz (Idea #2)
    const sGeo = new THREE.BufferGeometry();
    sGeo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0], 3));
    shootingStar = new THREE.Points(sGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.5, transparent: true, blending: THREE.AdditiveBlending}));
    scene.add(shootingStar);
    resetShootingStar();

    animate();
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').remove(), 1000);
    }, 2500);

    window.addEventListener('click', onInteract);
}

function createHeart() {
    const count = 4000;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        pos[i*3] = x * 1.5;
        pos[i*3+1] = y * 1.5;
        pos[i*3+2] = (Math.random() - 0.5) * 10;
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({color: 0xff3377, size: 0.5, blending: THREE.AdditiveBlending, transparent: true}));
}

function resetShootingStar() {
    shootingStar.position.set((Math.random()-0.5)*200, 100, (Math.random()-0.5)*100);
    gsap.to(shootingStar.position, {
        x: shootingStar.position.x - 200,
        y: -100,
        duration: 1.5,
        delay: 5 + Math.random() * 10,
        onComplete: resetShootingStar
    });
}

const frases = [
    "Eres lo mejor que me pasó en 2025 ❤️",
    "Apenas llevamos 140 días y ya te quiero para siempre",
    "30 de Octubre: El día que mi suerte cambió",
    "Gracias por cada sonrisa en este universo",
    "Natasha, eres mi estrella favorita"
];

function onInteract(e) {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(mouse, camera);
    
    if(ray.intersectObject(heartSystem).length > 0) {
        const cap = document.getElementById('caption-box');
        cap.innerText = frases[Math.floor(Math.random()*frases.length)];
        cap.style.opacity = '1';
        gsap.to(heartSystem.scale, {x: 1.3, y: 1.3, z: 1.3, duration: 0.4, yoyo: true, repeat: 1});
        setTimeout(() => cap.style.opacity = '0', 3500);
    }
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    heartSystem.rotation.y += 0.005;
    heartSystem.scale.setScalar(1 + Math.sin(t*2)*0.03);
    starSystem.rotation.y += 0.0005;
    renderer.render(scene, camera);
}

// CORRECCIÓN DE FECHA: 30 de Octubre 2025
const inicio = new Date("October 30, 2025 00:00:00").getTime();
setInterval(() => {
    const ahora = new Date().getTime();
    const dif = ahora - inicio;
    const d = Math.floor(dif / 86400000);
    const h = Math.floor((dif % 86400000) / 3600000);
    const m = Math.floor((dif % 3600000) / 60000);
    const s = Math.floor((dif % 60000) / 1000);
    document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}, 1000);

init();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
