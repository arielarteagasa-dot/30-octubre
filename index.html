```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:'Montserrat',sans-serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* PANTALLA INICIAL */
#start{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:10;
}

#start h1{
font-family:'Dancing Script';
font-size:3rem;
color:#ff6b81;
}

#heart{
font-size:5rem;
animation:beat 1s infinite;
}

@keyframes beat{
50%{transform:scale(1.2);}
}

/* CONTENIDO */
#content{
display:none;
text-align:center;
padding:20px;
}

.title{
font-family:'Dancing Script';
font-size:3rem;
margin-bottom:10px;
}

.text{
opacity:0.9;
margin-bottom:20px;
}

/* BOTÓN */
button{
background:#ff6b81;
border:none;
padding:12px 25px;
border-radius:25px;
color:white;
font-size:1rem;
cursor:pointer;
}

/* CARTA */
#letter{
display:none;
margin-top:20px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

/* CORAZONES */
.heart{
position:absolute;
color:#ff6b81;
animation:fall linear;
}

@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="start">
<div id="heart">❤️</div>
<h1>Toca para comenzar</h1>
</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="cancion.mp3" type="audio/mpeg">
</audio>

<!-- CONTENIDO -->
<div id="content">
<div class="title">Para Ti ❤️</div>
<div class="text">Tengo algo que decirte...</div>

<button onclick="mostrarCarta()">Abrir 💌</button>

<div id="letter">
<p>
Desde que llegaste a mi vida todo cambió...  
cada día contigo es especial.  
<br><br>
Gracias por existir, por hacerme feliz  
y por ser mi lugar favorito.  
<br><br>
<b>Te amo ❤️</b>
</p>
</div>
</div>

<script>
const start = document.getElementById("start");
const content = document.getElementById("content");
const music = document.getElementById("music");

/* INICIO + AUDIO SEGURO */
start.addEventListener("click", () => {
start.style.display = "none";
content.style.display = "block";

/* 🔥 ESTO GARANTIZA QUE FUNCIONE */
music.currentTime = 0;
music.volume = 1;

music.play().catch(() => {
alert("Toca otra vez para activar la música ❤️");
});
});

/* MOSTRAR CARTA */
function mostrarCarta(){
document.getElementById("letter").style.display="block";
explosion();
}

/* EFECTO CORAZONES */
function explosion(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=Math.random()*100+"vw";
h.style.top="-20px";
h.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},200);
}
</script>

</body>
</html>
```
