```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

/* PANTALLA INICIO */
#start{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
z-index:10;
}

#start h1{
font-family:'Great Vibes';
font-size:3rem;
color:#ff6b81;
}

.heart{
font-size:5rem;
animation:latir 1s infinite;
}

@keyframes latir{
50%{transform:scale(1.2);}
}

/* CONTENIDO */
#main{
display:none;
text-align:center;
padding:20px;
}

.title{
font-family:'Great Vibes';
font-size:3rem;
margin-bottom:10px;
}

.text{
opacity:0.9;
margin-bottom:20px;
}

/* BOTÓN */
button{
background:#ff6b81;
border:none;
padding:12px 25px;
border-radius:25px;
color:white;
font-size:1rem;
cursor:pointer;
}

/* CARTA */
#carta{
display:none;
margin-top:20px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

/* CORAZONES */
.corazon{
position:absolute;
color:#ff6b81;
animation:caer linear;
}

@keyframes caer{
to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="start">
<div class="heart">❤️</div>
<h1>Tócame...</h1>
</div>

<!-- 🎵 AUDIO ONLINE (CLAVE) -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce8b.mp3" type="audio/mpeg">
</audio>

<!-- CONTENIDO -->
<div id="main">
<div class="title">Para Ti ❤️</div>
<div class="text">Hay algo que quiero decirte...</div>

<button onclick="mostrarCarta()">Abrir carta 💌</button>

<div id="carta">
<p>
No sé cómo explicarlo…  
pero desde que estás en mi vida, todo es mejor.  
<br><br>
Eres mi paz, mi alegría  
y la persona que quiero siempre a mi lado.  
<br><br>
<b>Te amo ❤️</b>
</p>
</div>
</div>

<script>
const start = document.getElementById("start");
const main = document.getElementById("main");
const music = document.getElementById("music");

/* 🔥 INICIO REAL */
start.addEventListener("click", () => {
start.style.display="none";
main.style.display="block";

/* ESTO HACE QUE FUNCIONE SI O SI */
music.currentTime = 0;

music.play().then(()=>{
console.log("Audio funcionando");
}).catch(()=>{
alert("Si no suena, toca otra vez ❤️");
});
});

/* CARTA */
function mostrarCarta(){
document.getElementById("carta").style.display="block";
lluviaCorazones();
}

/* EFECTO */
function lluviaCorazones(){
setInterval(()=>{
let c=document.createElement("div");
c.className="corazon";
c.innerText="❤️";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";
c.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},200);
}
</script>

</body>
</html>
```
