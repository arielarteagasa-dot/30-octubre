<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 de Octubre | Nuestra Eternidad</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@200;400&display=swap');

        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Raleway', sans-serif; }
        
        /* Capa de Interfaz */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; box-sizing: border-box;
        }

        .header { opacity: 0; transform: translateY(-20px); transition: 2s ease-out; }
        .header h1 { 
            font-family: 'Cinzel', serif; color: white; margin: 0; 
            letter-spacing: 8px; font-size: 2.5rem; text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .footer { 
            display: flex; justify-content: center; gap: 20px; 
            opacity: 0; transition: 2s; pointer-events: auto;
        }

        .btn-interact {
            padding: 12px 30px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer;
            backdrop-filter: blur(10px); border-radius: 2px; letter-spacing: 2px;
            transition: 0.4s; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-interact:hover { background: white; color: black; box-shadow: 0 0 30px white; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; display: flex; justify-content: center;
            align-items: center; color: white; transition: 1s;
        }

        #caption {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; width: 80%; pointer-events: none;
            font-size: 1.5rem; font-style: italic; text-shadow: 0 0 10px black;
            opacity: 0; transition: 1s;
        }
    </style>
</head>
<body>

<div id="loader">CARGANDO NUESTRO MUNDO...</div>

<div id="overlay">
    <div class="header" id="ui-header">
        <h1>NATASHA</h1>
        <p style="color: rgba(255,255,255,0.5); letter-spacing: 3px;">ANIVERSARIO · 30 DE OCTUBRE</p>
    </div>
    <div class="footer" id="ui-footer">
        <button class="btn-interact" onclick="focusObject(0)">Nuestra Primera Foto</button>
        <button class="btn-interact" onclick="focusObject(3)">Un Momento Especial</button>
        <button class="btn-interact" onclick="resetCamera()">Vista General</button>
    </div>
</div>

<div id="caption"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls, crystals = [];
const loaderText = document.getElementById('loader');

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.08);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 30);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2; // No ver debajo del suelo

    // 1. ILUMINACIÓN CINEMATOGRÁFICA
    const ambient = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambient);

    const mainLight = new THREE.PointLight(0xff0055, 2, 50);
    mainLight.position.set(0, 10, 0);
    scene.add(mainLight);

    // 2. EL SUELO (ESPEJO)
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ 
        color: 0x111111, metalness: 0.9, roughness: 0.1 
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 3. ESTRELLAS LEJANAS
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for(let i=0; i<5000; i++) {
        starCoords.push((Math.random()-0.5)*200, Math.random()*100, (Math.random()-0.5)*200);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
    scene.add(new THREE.Points(starGeo, starMat));

    // 4. CRISTALES DE MEMORIA (Tus fotos)
    const texLoader = new THREE.TextureLoader();
    const photos = [
        'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
        'foto4.jpg', 'foto5.jpg', 'foto6.jpg'
    ];
    const frases = [
        "Donde todo comenzó...",
        "Tu sonrisa, mi lugar favorito.",
        "Cada segundo a tu lado cuenta.",
        "Eres el regalo más lindo.",
        "Por mil octubres más.",
        "Te amo, hoy y siempre."
    ];

    const crystalGeo = new THREE.CylinderGeometry(0, 1.5, 4, 6);
    
    for(let i=0; i<6; i++) {
        const group = new THREE.Group();
        
        // El cristal exterior
        const mat = new THREE.MeshPhongMaterial({
            color: 0xffffff, transparent: true, opacity: 0.3, wireframe: false, shininess: 100
        });
        const mesh = new THREE.Mesh(crystalGeo, mat);
        
        // La foto dentro del cristal
        const photoGeo = new THREE.PlaneGeometry(1.8, 2.5);
        const photoMat = new THREE.MeshBasicMaterial({ 
            map: texLoader.load(photos[i]), 
            side: THREE.DoubleSide,
            transparent: true
        });
        const photoMesh = new THREE.Mesh(photoGeo, photoMat);
        photoMesh.position.y = 0;

        group.add(mesh);
        group.add(photoMesh);

        const angle = (i / 6) * Math.PI * 2;
        group.position.set(Math.cos(angle) * 12, 2.5, Math.sin(angle) * 12);
        group.userData = { frase: frases[i] };
        
        scene.add(group);
        crystals.push(group);
    }

    // Inicio de la experiencia
    setTimeout(() => {
        loaderText.style.opacity = "0";
        setTimeout(() => loaderText.remove(), 1000);
        document.getElementById('ui-header').style.opacity = "1";
        document.getElementById('ui-footer').style.opacity = "1";
        gsap.to(camera.position, { z: 25, y: 8, duration: 4, ease: "power2.inOut" });
    }, 2000);
}

// Función para enfocar un recuerdo
function focusObject(index) {
    const target = crystals[index];
    const caption = document.getElementById('caption');
    
    // Movimiento de cámara suave con GSAP
    gsap.to(camera.position, {
        x: target.position.x * 1.5,
        y: target.position.y + 1,
        z: target.position.z * 1.5,
        duration: 2,
        onUpdate: () => camera.lookAt(target.position)
    });

    caption.innerText = target.userData.frase;
    caption.style.opacity = "1";
    setTimeout(() => caption.style.opacity = "0", 4000);
}

function resetCamera() {
    gsap.to(camera.position, { x: 0, y: 15, z: 30, duration: 2 });
    document.getElementById('caption').style.opacity = "0";
}

function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    
    crystals.forEach((c, i) => {
        c.rotation.y += 0.005;
        c.position.y = 2.5 + Math.sin(time + i) * 0.5;
    });

    controls.update();
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
animate();
</script>
</body>
</html>
