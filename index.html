<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Natasha | Nexo 30 de Octubre</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;400&display=swap');

        body { margin: 0; overflow: hidden; background: #0a0112; font-family: 'Montserrat', sans-serif; color: white; }
        
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 50px; box-sizing: border-box; }
        
        /* Encabezado */
        .header h1 { font-family: 'Dancing Script', cursive; margin: 0; font-size: 3rem; color: #ff3377; text-shadow: 0 0 20px rgba(255, 51, 119, 0.8); }
        .fecha { letter-spacing: 6px; font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; margin-bottom: 5px;}

        /* Contador */
        .contador-container { position: absolute; top: 50px; right: 50px; background: rgba(0,0,0,0.4); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(5px); border: 1px solid rgba(255, 51, 119, 0.3); text-align: center; }
        #timer { font-size: 1.1rem; font-weight: 200; color: #ffebf2; }

        /* Pantalla de Carga/Inicio */
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; }
        .loader-heart { font-size: 40px; color: #ff3377; animation: pulse 1s infinite ease-in-out; text-shadow: 0 0 20px #ff3377; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        #instrucciones { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;}
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-heart">❤</div>
    <p style="margin-top: 20px; letter-spacing: 5px; font-size: 10px;">CREANDO MUNDO VOLUMÉTRICO</p>
</div>

<div id="ui">
    <div class="header">
        <p class="fecha">Desde el 30 de Octubre</p>
        <h1>Para Mi Natasha</h1>
    </div>
    
    <div class="contador-container">
        <p style="margin: 0 0 10px 0; font-size: 0.7rem; letter-spacing: 2px;">TIEMPO A TU LADO</p>
        <div id="timer">Calculando eternidad...</div>
    </div>

    <div id="instrucciones">Utiliza el mouse para orbitar | Haz clic en el Nexo central</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
let scene, camera, renderer, controls, raycaster, mouse;
let dome, nexus, floor, particles, auroraSphere;
let cespedPatches = [];
let clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0112, 0.02);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 80); // Vista cinemática alta

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2 - 0.1;

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    // 1. ILUMINACIÓN VOLUMÉTRICA
    scene.add(new THREE.AmbientLight(0x0a0112, 1));
    const pointL = new THREE.PointLight(0xff3377, 4, 100);
    pointL.position.set(0, 30, 0);
    scene.add(pointL);

    // 2. SUELO METALIZADO (Falso Reflejo)
    const floorGeo = new THREE.CircleGeometry(100, 64);
    const floorMat = new THREE.MeshStandardMaterial({
        color: 0x010101, metalness: 0.8, roughness: 0.2
    });
    floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.1;
    scene.add(floor);

    // 3. LA ARQUITECTURA: DOMO GEODÉSICO (Procedimental)
    const domeGeo = new THREE.IcosahedronGeometry(70, 2);
    const domeMat = new THREE.MeshPhongMaterial({
        color: 0x441144, wireframe: true, transparent: true, opacity: 0.04
    });
    dome = new THREE.Mesh(domeGeo, domeMat);
    scene.add(dome);

    // 4. EL NEXO CENTRAL (Interactivo)
    const nexusGeo = new THREE.OctahedronGeometry(4, 1);
    const nexusMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, emissive: 0xff3377, emissiveIntensity: 2, flatShading: true
    });
    nexus = new THREE.Mesh(nexusGeo, nexusMat);
    nexus.position.y = 15;
    scene.add(nexus);

    // 5. GENERACIÓN PROCEDIMENTAL DE CÉSPED NEÓN (300 parches)
    const grassGeo = new THREE.CylinderGeometry(0.1, 0.3, 2, 4);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x051a05, emissive: 0x1a0a2a, emissiveIntensity: 1, flatShading: true });

    for(let i=0; i<300; i++) {
        const cluster = new THREE.Group();
        for(let j=0; j<5; j++) {
            const blade = new THREE.Mesh(grassGeo, grassMat);
            blade.position.set((Math.random()-0.5)*1.5, Math.random()*0.5, (Math.random()-0.5)*1.5);
            blade.scale.y = 1 + Math.random()*2;
            cluster.add(blade);
        }
        cluster.position.set((Math.random()-0.5)*150, 0, (Math.random()-0.5)*150);
        cluster.rotation.y = Math.random()*Math.PI;
        scene.add(cluster);
        cespedPatches.push(cluster);
    }

    // 6. LUCIÉRNAGAS
    const fGeo = new THREE.BufferGeometry();
    const fPos = [];
    for(let i=0; i<300; i++) fPos.push((Math.random()-0.5)*180, Math.random()*50, (Math.random()-0.5)*180);
    fGeo.setAttribute('position', new THREE.Float32BufferAttribute(fPos, 3));
    particles = new THREE.Points(fGeo, new THREE.PointsMaterial({color: 0xfff59d, size: 0.6, transparent: true, blending: THREE.AdditiveBlending}));
    scene.add(fireflies);

    // Arrancar la experiencia
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').remove(), 1000);
        gsap.to(camera.position, {y: 15, z: 60, duration: 4, ease: "power2.inOut"});
    }, 2000);

    window.addEventListener('click', onClick);
    animate();
}

// LÓGICA DE INTERACCIÓN: DESPERTAR EL MUNDO
function onClick(e) {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(nexus);
    
    if(intersects.length > 0) {
        // Cinemática Asombrosa (AAA Ambition)
        
        // 1. Viaje Cinematográfico al Nexo
        gsap.to(camera.position, {
            x: nexus.position.x * 1.3, y: 18, z: nexus.position.z * 1.3,
            duration: 2, ease: "power3.inOut",
            onUpdate: () => camera.lookAt(nexus.position.x, 8, nexus.position.z)
        });

        // 2. Despertar Volumétrico del Mundo (The Wondrous World)
        // El Domo se abre y cambia de color
        gsap.to(dome.scale, { x: 1.5, y: 1.5, z: 1.5, duration: 2 });
        gsap.to(dome.material, { color: 0xff3377, opacity: 0.1, duration: 2 });
        gsap.to(floor.material, { emissive: 0x440022, duration: 2 });
        
        // El Nexo explota de luz (Bloom Proxy)
        const l = scene.children.find(c => c.isPointLight);
        gsap.to(l, { intensity: 10, duration: 0.5 });
        gsap.to(nexus.scale, { x: 2, y: 2, z: 2, duration: 0.5, yoyo: true, repeat: 1 });
        
        // Cambiar color de todo el césped
        cespedPatches.forEach((c, i) => {
            gsap.to(c.children[0].material, { emissive: 0x882255, emissiveIntensity: 2, delay: i*0.01, duration: 1 });
        });

        // Regresar cámara y ocultar texto
        setTimeout(() => {
            gsap.to(camera.position, {x:0, y:15, z:60, duration: 3, ease: "power2.inOut"});
        }, 5000);
    }
}

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Movimiento orgánico de luciérnagas
    if(fireflies) {
        fireflies.position.y = Math.sin(t * 0.3) * 3;
        fireflies.rotation.y += 0.0003;
    }

    // Animación de césped (Balanceo suave)
    cespedPatches.forEach((c, i) => {
        c.rotation.z = Math.sin(t*0.5 + i) * 0.05;
        c.children.forEach(b => b.scale.y = (1.5 + Math.sin(t*2+i*0.1)*0.5) );
    });

    // Animación del nexo (Girar)
    nexus.rotation.y += 0.01;
    nexus.rotation.x += 0.005;

    controls.update();
    renderer.render(scene, camera);
}

// 7. Lógica del Contador (Desde el 30 de Octubre 2024)
const fechaInicio = new Date("October 30, 2024 00:00:00").getTime();
function updateTimer() {
    const ahora = new Date().getTime();
    const diferencia = ahora - fechaInicio;
    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
    document.getElementById("timer").innerHTML = `${dias}d ${horas}h ${minutos}m ${segundos}s`;
}
setInterval(updateTimer, 1000);
updateTimer();

init();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
