<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 80%; max-width: 600px; border: 1px solid #00ff41; padding: 20px; }
        .btn-choice { display: block; width: 100%; padding: 10px; margin-top: 10px; background: none; border: 1px solid #00ff41; color: #00ff41; cursor: pointer; text-align: left; }
        .btn-choice:hover { background: #003310; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="texto">Es nuestro aniversario... Natasha, ¿qué quieres hacer hoy?</div>
        <div id="opciones">
            <button class="btn-choice" onclick="paso(1)">A) Recordar cómo empezó todo</button>
            <button class="btn-choice" onclick="paso(2)">B) Decirte cuánto te amo ahora</button>
        </div>
    </div>
    <script>
        const contenido = {
            1: { t: "Todo empezó con una mirada y aquel 30 de octubre... ¿Recuerdas nuestro primer beso?", o: ["Sí, fue mágico", "Lo recuerdo como si fuera ayer"], next: 3 },
            2: { t: "Hoy te amo más que ayer, pero menos que mañana. Eres mi presente eterno.", o: ["Yo también te amo", "Eres lo mejor de mi vida"], next: 3 },
            3: { t: "¡FELIZ ANIVERSARIO! Eres la mejor novia del mundo. ❤️", o: [], next: null }
        };
        function paso(id) {
            const p = contenido[id];
            document.getElementById('texto').innerText = p.t;
            let html = "";
            p.o.forEach(opt => html += `<button class="btn-choice" onclick="paso(${p.next})">${opt}</button>`);
            document.getElementById('opciones').innerHTML = html;
        }
    </script>
</body>
</html>
