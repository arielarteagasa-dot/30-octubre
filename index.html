<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi estrella favorita</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Diseño del Espacio */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at bottom, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Evita que se mueva la pantalla */
            position: relative;
        }

        /* Título y Contador Flotante */
        .encabezado {
            text-align: center;
            position: absolute;
            top: 10%;
            width: 100%;
            z-index: 10;
            animation: flotar 4s ease-in-out infinite;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            color: #fce788;
            text-shadow: 0 0 10px rgba(252, 231, 136, 0.5);
            margin-bottom: 5px;
        }

        .contador-estelar {
            font-size: 1.2em;
            letter-spacing: 2px;
            color: #d1d5db;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Estrellas Interactivas (Las sorpresas) */
        .estrella-magica {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px 5px #fce788;
            cursor: pointer;
            animation: palpitar 2s infinite alternate;
            z-index: 5;
            transition: transform 0.3s;
        }

        .estrella-magica:hover {
            transform: scale(1.5);
        }

        @keyframes palpitar {
            0% { box-shadow: 0 0 10px 2px #fce788, 0 0 20px 5px rgba(255,255,255,0.8); }
            100% { box-shadow: 0 0 30px 10px #fce788, 0 0 40px 10px rgba(255,255,255,1); }
        }

        /* Posiciones de las estrellas en el cielo */
        #estrella1 { top: 40%; left: 20%; }
        #estrella2 { top: 60%; left: 70%; }
        #estrella3 { top: 30%; left: 80%; }
        #estrella4 { top: 75%; left: 30%; }

        /* Modal (El mensaje que se abre) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-contenido {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #fce788;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 0 30px rgba(252, 231, 136, 0.3);
            animation: aparecer 0.5s ease-out;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal h2 {
            font-family: 'Cinzel', serif;
            color: #fce788;
        }

        .cerrar {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: transparent;
            color: #fce788;
            border: 1px solid #fce788;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
        }

        .cerrar:hover {
            background-color: #fce788;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="encabezado">
        <h1>Mi Universo Eres Tú</h1>
        <div class="contador-estelar" id="contador">Calculando nuestro viaje...</div>
        <p style="font-size: 0.9em; opacity: 0.7; margin-top: 20px;">Toca las estrellas más brillantes para descubrir un secreto.</p>
    </div>

    <div class="estrella-magica" id="estrella1" onclick="abrirMensaje('Recuerdo #1', 'La primera vez que te vi, supe que mi vida iba a cambiar. Eres mi casualidad más bonita.')"></div>
    
    <div class="estrella-magica" id="estrella2" onclick="abrirMensaje('Lo que más amo de ti', 'Tu forma de hacerme reír y cómo iluminas cualquier lugar al que llegas. No hay nadie como tú.')"></div>
    
    <div class="estrella-magica" id="estrella3" onclick="abrirMensaje('Nuestra Promesa', 'Prometo cuidarte, escucharte y elegirte todos los días. Sin importar lo que pase.')"></div>
    
    <div class="estrella-magica" id="estrella4" onclick="abrirMensaje('¡Tu Sorpresa!', 'Ya que tocaste todas las estrellas... ¡Prepárate! Hoy te invito a cenar a tu lugar favorito. Te amo.')"></div>

    <div class="modal" id="miModal">
        <div class="modal-contenido">
            <h2 id="titulo-mensaje">Título</h2>
            <p id="texto-mensaje">Texto del mensaje de la estrella.</p>
            <button class="cerrar" onclick="cerrarMensaje()">Cerrar</button>
        </div>
    </div>

    <script>
        // --- CONTADOR: INICIA EL 30 DE OCTUBRE DE 2025 ---
        const fechaInicio = new Date('October 30, 2025 00:00:00').getTime();

        function actualizarContador() {
            const ahora = new Date().getTime();
            const diferencia = ahora - fechaInicio;

            // Si por alguna razón abren la página ANTES de la fecha
            if (diferencia < 0) {
                document.getElementById("contador").innerHTML = "Faltan días para nuestra gran fecha...";
                return;
            }

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById("contador").innerHTML = 
                `${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos de pura magia.`;
        }
        setInterval(actualizarContador, 1000);
        actualizarContador(); // Ejecutar de inmediato

        // --- LÓGICA DE LOS MENSAJES (MODAL) ---
        function abrirMensaje(titulo, texto) {
            document.getElementById("titulo-mensaje").innerText = titulo;
            document.getElementById("texto-mensaje").innerText = texto;
            document.getElementById("miModal").style.display = "flex";
        }

        function cerrarMensaje() {
            document.getElementById("miModal").style.display = "none";
        }
    </script>
</body>
</html>
