<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexo Temporal | Natasha</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0110; font-family: sans-serif; color: white; }
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; transition: 1s; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; text-align: center; padding: 50px; box-sizing: border-box; }
        #caption { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-style: italic; opacity: 0; transition: 0.5s; color: #ffebf2; }
    </style>
</head>
<body>

<div id="loader"><h2>CARGANDO JARDÍN SINCRONIZADO...</h2></div>

<div id="ui">
    <h1 style="letter-spacing: 10px;">NATASHA</h1>
    <div id="caption"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

<script>
let scene, camera, renderer, controls, hongos = [];
const frases = ["Primer mirada ❤️", "Tu risa", "30 de Octubre", "Nuestro amor", "Siempre tú"];

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 60);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.PointLight(0xff3377, 2, 100);
    light.position.set(0, 20, 10);
    scene.add(light);

    // Suelo
    const floor = new THREE.Mesh(new THREE.CircleGeometry(50, 32), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // Crear "Hongos" con esferas (Para que no falle por falta de archivos)
    for(let i=0; i<5; i++) {
        const hongo = new THREE.Group();
        
        // Sombrero del hongo
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(2, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2),
            new THREE.MeshPhongMaterial({color: 0xff3377, emissive: 0x550022})
        );
        hongo.add(head);

        // Tallo
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3), new THREE.MeshPhongMaterial({color: 0xeeeeee}));
        stem.position.y = -1.5;
        hongo.add(stem);

        const angle = (i/5) * Math.PI * 2;
        hongo.position.set(Math.cos(angle)*20, 1.5, Math.sin(angle)*20);
        hongo.userData = { msg: frases[i] };
        scene.add(hongo);
        hongos.push(hongo);
    }

    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').remove(), 1000);

    window.addEventListener('click', onDocClick);
    animate();
}

function onDocClick(e) {
    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(mouse, camera);
    const intersects = ray.intersectObjects(hongos, true);
    
    if(intersects.length > 0) {
        let obj = intersects[0].object.parent;
        const cap = document.getElementById('caption');
        cap.innerText = obj.userData.msg;
        cap.style.opacity = '1';
        
        gsap.to(camera.position, {
            x: obj.position.x * 1.5, y: 10, z: obj.position.z * 1.5, duration: 1.5,
            onUpdate: () => camera.lookAt(obj.position)
        });

        setTimeout(() => { cap.style.opacity = '0'; }, 3000);
    }
}

function animate() {
    requestAnimationFrame(animate);
    hongos.forEach((h, i) => h.position.y = 1.5 + Math.sin(Date.now()*0.002 + i) * 0.5);
    controls.update();
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
